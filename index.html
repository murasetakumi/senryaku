<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logline｜提案書自動生成システム v3.0</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dim: #8B6914;
    --obsidian: #0A0A0A;
    --charcoal: #141414;
    --dark-card: #1A1A1A;
    --dark-border: #2A2A2A;
    --text-primary: #F0EDE6;
    --text-muted: #7A7068;
  }

  * { box-sizing: border-box; }

  body {
    background-color: var(--obsidian);
    color: var(--text-primary);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Cinematic grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  .gold-text { color: var(--gold); }
  .gold-gradient {
    background: linear-gradient(135deg, var(--gold-dim) 0%, var(--gold) 50%, var(--gold-light) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .gold-border { border-color: var(--gold-dim); }
  .gold-border-bright { border-color: var(--gold); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--charcoal); }
  ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

  /* Header */
  .site-header {
    background: linear-gradient(180deg, rgba(10,10,10,0.98) 0%, rgba(10,10,10,0.85) 100%);
    border-bottom: 1px solid var(--dark-border);
    backdrop-filter: blur(20px);
  }

  /* Logo */
  .logo-mark {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    letter-spacing: 0.15em;
    font-weight: 300;
    color: var(--gold-light);
  }
  .logo-dot { color: #E05252; font-size: 1.2em; }

  /* Left panel */
  .left-panel {
    background: var(--charcoal);
    border-right: 1px solid var(--dark-border);
    height: calc(100vh - 60px);
    overflow-y: auto;
    position: sticky;
    top: 60px;
  }

  /* Form inputs */
  .form-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 6px;
    display: block;
  }
  .form-input {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--dark-border);
    color: var(--text-primary);
    padding: 10px 14px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85rem;
    transition: all 0.2s;
    outline: none;
    border-radius: 2px;
  }
  .form-input:focus {
    border-color: var(--gold-dim);
    background: rgba(201,168,76,0.04);
    box-shadow: 0 0 0 1px rgba(201,168,76,0.15);
  }
  .form-input::placeholder { color: #444; }
  textarea.form-input { resize: vertical; min-height: 72px; }

  /* Generate button */
  .btn-generate {
    background: linear-gradient(135deg, #8B6914 0%, #C9A84C 50%, #E8C97A 100%);
    color: #0A0A0A;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.2em;
    padding: 14px 28px;
    width: 100%;
    border: none;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    border-radius: 2px;
  }
  .btn-generate:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 32px rgba(201,168,76,0.3);
  }
  .btn-generate:active { transform: translateY(0); }
  .btn-generate:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }
  .btn-generate::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.15) 50%, transparent 70%);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }
  .btn-generate:hover::after { transform: translateX(100%); }

  /* Right panel */
  .right-panel {
    background: var(--obsidian);
    min-height: calc(100vh - 60px);
  }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-height: 60vh;
    gap: 20px;
    opacity: 0.5;
  }
  .empty-state-icon {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 5rem;
    color: var(--dark-border);
    line-height: 1;
  }

  /* Loading */
  .loading-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 24px;
  }
  .loading-film-strip {
    display: flex;
    gap: 6px;
    align-items: flex-end;
  }
  .loading-film-strip span {
    width: 4px;
    border-radius: 2px;
    background: var(--gold);
    animation: filmBar 1.2s ease-in-out infinite;
  }
  .loading-film-strip span:nth-child(1) { height: 16px; animation-delay: 0s; }
  .loading-film-strip span:nth-child(2) { height: 28px; animation-delay: 0.1s; }
  .loading-film-strip span:nth-child(3) { height: 20px; animation-delay: 0.2s; }
  .loading-film-strip span:nth-child(4) { height: 36px; animation-delay: 0.3s; }
  .loading-film-strip span:nth-child(5) { height: 24px; animation-delay: 0.4s; }
  .loading-film-strip span:nth-child(6) { height: 32px; animation-delay: 0.5s; }
  .loading-film-strip span:nth-child(7) { height: 18px; animation-delay: 0.6s; }
  @keyframes filmBar {
    0%, 100% { transform: scaleY(0.5); opacity: 0.4; }
    50% { transform: scaleY(1.2); opacity: 1; }
  }
  .loading-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    color: var(--gold);
    letter-spacing: 0.15em;
    font-style: italic;
  }
  .loading-subtext {
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* Section cards */
  .section-card {
    background: var(--dark-card);
    border: 1px solid var(--dark-border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 20px;
    animation: fadeInUp 0.5s ease both;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--dark-border);
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(201,168,76,0.03);
  }
  .section-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--gold-dim);
    line-height: 1;
    min-width: 32px;
  }
  .section-title-en {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.7rem;
    color: var(--gold-dim);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    display: block;
  }
  .section-title-ja {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text-primary);
    display: block;
    line-height: 1.2;
  }

  .section-body { padding: 24px; }

  /* Concept cards */
  .concept-card {
    border: 1px solid var(--dark-border);
    border-radius: 3px;
    padding: 20px;
    margin-bottom: 14px;
    position: relative;
    transition: border-color 0.2s;
  }
  .concept-card:hover { border-color: var(--gold-dim); }
  .concept-num-badge {
    position: absolute;
    top: -1px;
    left: 20px;
    background: var(--gold);
    color: #0A0A0A;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    padding: 2px 10px;
    border-radius: 0 0 3px 3px;
  }
  .concept-title {
    font-size: 1rem;
    font-weight: 700;
    margin-top: 18px;
    margin-bottom: 8px;
    color: var(--text-primary);
  }
  .concept-bio {
    font-size: 0.82rem;
    color: #AAA;
    line-height: 1.8;
    margin-bottom: 14px;
    white-space: pre-wrap;
  }
  .merit-demerit {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .merit-box, .demerit-box {
    padding: 10px 14px;
    border-radius: 3px;
    font-size: 0.78rem;
    line-height: 1.7;
  }
  .merit-box {
    background: rgba(74,222,128,0.06);
    border: 1px solid rgba(74,222,128,0.2);
    color: #86efac;
  }
  .merit-box strong, .demerit-box strong {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 4px;
    font-weight: 700;
  }
  .demerit-box {
    background: rgba(248,113,113,0.06);
    border: 1px solid rgba(248,113,113,0.2);
    color: #fca5a5;
  }

  /* Hearing section */
  .hearing-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 900px) {
    .hearing-grid { grid-template-columns: 1fr; }
    .merit-demerit { grid-template-columns: 1fr; }
  }
  .hearing-block {
    padding: 16px 18px;
    border: 1px solid var(--dark-border);
    border-radius: 3px;
  }
  .hearing-block-title {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
    font-weight: 700;
  }
  .hearing-block ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .hearing-block ul li {
    font-size: 0.82rem;
    color: #BBB;
    line-height: 1.8;
    padding-left: 14px;
    position: relative;
    margin-bottom: 2px;
  }
  .hearing-block ul li::before {
    content: '▸';
    position: absolute;
    left: 0;
    color: var(--gold-dim);
    font-size: 0.7rem;
    top: 3px;
  }

  /* Video concept cards */
  .video-card {
    border: 1px solid var(--dark-border);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }
  .video-card:hover { border-color: var(--gold-dim); }
  .video-card-header {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--dark-border);
    background: rgba(255,255,255,0.02);
  }
  .video-tag {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    padding: 3px 10px;
    border-radius: 2px;
    border: 1px solid var(--gold-dim);
    color: var(--gold);
  }
  .video-title {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text-primary);
  }
  .video-card-body { padding: 16px 18px; }
  .video-section-label {
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 6px;
    margin-top: 12px;
    font-weight: 700;
  }
  .video-section-label:first-child { margin-top: 0; }
  .video-content {
    font-size: 0.82rem;
    color: #BBB;
    line-height: 1.8;
    white-space: pre-wrap;
  }

  /* Simulation */
  .phase-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  @media (max-width: 900px) {
    .phase-cards { grid-template-columns: 1fr; }
  }
  .phase-card {
    border: 1px solid var(--dark-border);
    border-radius: 3px;
    padding: 18px;
    position: relative;
    overflow: hidden;
  }
  .phase-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
  }
  .phase-1::before { background: linear-gradient(90deg, #4ade80, #22c55e); }
  .phase-2::before { background: linear-gradient(90deg, var(--gold-dim), var(--gold)); }
  .phase-3::before { background: linear-gradient(90deg, #e05252, #f97316); }

  .phase-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    margin-bottom: 4px;
  }
  .phase-1 .phase-label { color: #4ade80; }
  .phase-2 .phase-label { color: var(--gold); }
  .phase-3 .phase-label { color: #f97316; }

  .phase-title {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 12px;
    line-height: 1.3;
  }
  .phase-metric {
    margin-bottom: 6px;
  }
  .phase-metric-label {
    font-size: 0.62rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }
  .phase-metric-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    color: var(--text-primary);
    font-weight: 600;
    line-height: 1.2;
  }
  .phase-status {
    font-size: 0.75rem;
    color: #888;
    line-height: 1.7;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--dark-border);
  }

  /* CV Funnel */
  .funnel-container { margin-top: 8px; }
  .funnel-step {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .funnel-step:last-child { border-bottom: none; }
  .funnel-step-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    color: var(--gold-dim);
    min-width: 24px;
  }
  .funnel-step-info { flex: 1; }
  .funnel-step-title {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 2px;
  }
  .funnel-step-desc {
    font-size: 0.75rem;
    color: #888;
  }
  .funnel-step-num-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--gold);
    text-align: right;
    min-width: 80px;
  }
  .funnel-step-rate {
    font-size: 0.68rem;
    color: var(--text-muted);
    text-align: right;
  }

  /* Challenge section */
  .challenge-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }
  @media (max-width: 900px) {
    .challenge-grid { grid-template-columns: 1fr; }
  }
  .challenge-phase-block {
    border: 1px solid var(--dark-border);
    border-radius: 3px;
    overflow: hidden;
  }
  .challenge-phase-header {
    padding: 10px 16px;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--dark-border);
  }
  .sns-phase .challenge-phase-header { background: rgba(99,102,241,0.1); color: #a5b4fc; }
  .cv-phase .challenge-phase-header { background: rgba(251,146,60,0.1); color: #fdba74; }
  .onboard-phase .challenge-phase-header { background: rgba(74,222,128,0.08); color: #86efac; }

  .challenge-item {
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .challenge-item:last-child { border-bottom: none; }
  .challenge-q {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 6px;
    line-height: 1.5;
  }
  .challenge-a {
    font-size: 0.76rem;
    color: #999;
    line-height: 1.7;
    white-space: pre-wrap;
  }

  /* Output header */
  .output-header {
    padding: 24px 32px 0;
    border-bottom: 1px solid var(--dark-border);
    margin-bottom: 28px;
    padding-bottom: 20px;
  }
  .output-client-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 0.05em;
    color: var(--text-primary);
    line-height: 1;
  }
  .output-meta {
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    margin-top: 4px;
  }

  /* Streaming cursor */
  .stream-cursor::after {
    content: '▋';
    color: var(--gold);
    animation: blink 0.8s step-end infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Section delay animations */
  .section-card:nth-child(1) { animation-delay: 0.05s; }
  .section-card:nth-child(2) { animation-delay: 0.15s; }
  .section-card:nth-child(3) { animation-delay: 0.25s; }
  .section-card:nth-child(4) { animation-delay: 0.35s; }
  .section-card:nth-child(5) { animation-delay: 0.45s; }

  /* Print style guide badge */
  .logline-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border: 1px solid var(--dark-border);
    border-radius: 2px;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .logline-badge-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--gold);
  }
</style>
</head>

function buildUserPrompt(data) {
  return `以下のヒアリング情報をもとに、Loglineの採用SNSマーケティング提案書を作成してください。

## クライアント情報
- 企業名: ${data.companyName}
- 所在地・ターゲットエリア: ${data.area}
- 業界・職種: ${data.industry}
- 採用における現状の課題: ${data.challenge}
- 企業・社長の強み/人柄: ${data.strength}
- 採用目標人数: ${data.target}

上記の情報を深く分析し、このクライアントに最適化された提案書JSONを出力してください。
特にSection1のプロフィール文はこのクライアントの個性（${data.strength}）を最大限に活かした、コピーライティングとして完成度の高いものを作成してください。
Section4の数値は「採用目標${data.target}」から逆算し、${data.area}の市場規模・競合状況を考慮してリアルな数値シミュレーションを行ってください。`;
}

// ============================================================
// MAIN GENERATION FUNCTION
// ============================================================
async function generateProposal() {
  const data = {
    companyName: document.getElementById('companyName').value.trim(),
    area: document.getElementById('area').value.trim(),
    industry: document.getElementById('industry').value.trim(),
    challenge: document.getElementById('challenge').value.trim(),
    strength: document.getElementById('strength').value.trim(),
    target: document.getElementById('target').value.trim(),
  };
  const password = document.getElementById('appPassword').value.trim();

  // Validation
  const missing = [];
  if (!data.companyName) missing.push('企業名');
  if (!data.area) missing.push('所在地・ターゲットエリア');
  if (!data.industry) missing.push('業界・職種');
  if (!data.challenge) missing.push('採用における現状の課題');
  if (!data.strength) missing.push('企業・社長の強み/人柄');
  if (!data.target) missing.push('採用目標人数');
  if (!password) missing.push('パスワード');

  if (missing.length > 0) {
    showError(`以下の項目を入力してください：\n${missing.join('、')}`);
    return;
  }

  // UI: show loading
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('outputContent').style.display = 'none';
  document.getElementById('loadingState').style.display = 'flex';
  document.getElementById('generateBtn').disabled = true;

  const loadingMessages = [
    ['ヒアリング内容を分析中...', 'Parsing client data'],
    ['業界トレンドをリサーチ中...', 'Analyzing industry trends'],
    ['コンセプトを策定中...', 'Crafting account concepts'],
    ['数値シミュレーションを計算中...', 'Running CV simulations'],
    ['提案書を最終仕上げ中...', 'Finalizing proposal'],
  ];
  let msgIndex = 0;
  const msgInterval = setInterval(() => {
    msgIndex = (msgIndex + 1) % loadingMessages.length;
    document.getElementById('loadingText').textContent = loadingMessages[msgIndex][0];
    document.getElementById('loadingSubtext').textContent = loadingMessages[msgIndex][1];
  }, 2000);

  try {
    const response = await fetch('/api/gemini', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        password,
        system: buildSystemPrompt(),
        user: buildUserPrompt(data),
      }),
    });

    clearInterval(msgInterval);

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error || `API Error: ${response.status}`);
    }

    const result = await response.json();
    const rawText = result.text || '';

    // Parse JSON
    let proposalData;
    try {
      // Strip possible markdown code fences
      const cleaned = rawText.replace(/^```json?\s*/i, '').replace(/\s*```$/i, '').trim();
      proposalData = JSON.parse(cleaned);
    } catch (e) {
      throw new Error('AIの出力をJSONとしてパースできませんでした。もう一度試してください。\n\n' + rawText.slice(0, 200));
    }

    renderProposal(data, proposalData);

  } catch (err) {
    clearInterval(msgInterval);
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('emptyState').style.display = 'flex';
    showError('エラーが発生しました：\n' + err.message);
  } finally {
    document.getElementById('generateBtn').disabled = false;
  }
}

function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function showError(msg) {
  const existing = document.getElementById('errorToast');
  if (existing) existing.remove();

  const toast = document.createElement('div');
  toast.id = 'errorToast';
  toast.style.cssText = `
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:#1A1010; border:1px solid #E05252; color:#fca5a5;
    padding:14px 24px; border-radius:4px; font-size:0.82rem; line-height:1.6;
    white-space:pre-wrap; max-width:480px; z-index:9999;
    box-shadow:0 8px 32px rgba(0,0,0,0.5);
    animation: fadeInUp 0.3s ease;
  `;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 6000);
}

// Enter key support
